<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI-Readiness Assessment | Strategische KI-Beratung</title>
    <meta name="description" content="Professionelles KI-Readiness Assessment Tool für strategische Beratung. Evaluieren Sie die KI-Reife Ihres Unternehmens.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Landing / Start Screen -->
    <div id="landing" class="screen active">
        <div class="landing-bg">
            <div class="grid-overlay"></div>
        </div>
        <div class="landing-content">
            <div class="logo-mark">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect x="2" y="2" width="44" height="44" rx="12" stroke="url(#g1)" stroke-width="2.5"/>
                    <path d="M14 34V20l10-8 10 8v14" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="24" cy="26" r="4" stroke="url(#g1)" stroke-width="2"/>
                    <defs><linearGradient id="g1" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
                </svg>
            </div>
            <h1 class="landing-title">KI-Readiness<br><span class="gradient-text">Assessment</span></h1>
            <p class="landing-sub">Strategische Evaluierung der KI-Reife Ihres Unternehmens.<br>5 Module · 15 Prüfpunkte · 1 Sovereign AI Roadmap.</p>
            
            <div class="client-input-group">
                <label for="clientName">Unternehmen / Kunde</label>
                <input type="text" id="clientName" placeholder="z.B. Mustermann GmbH" autocomplete="off">
            </div>
            <div class="client-input-group">
                <label for="companyStage">Unternehmensphase</label>
                <select id="companyStage">
                    <option value="startup">Startup / Solo-Selbstständig</option>
                    <option value="kmu" selected>KMU (Mittelstand)</option>
                    <option value="enterprise">Enterprise (Konzern)</option>
                </select>
            </div>
            <div class="client-input-group">
                <label for="workshopDate">Datum des Workshops</label>
                <input type="date" id="workshopDate">
            </div>

            <button class="btn-primary" onclick="startAssessment()">
                Assessment starten
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 10h12m0 0l-4-4m4 4l-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
    </div>

    <!-- Assessment Screen -->
    <div id="assessment" class="screen">
        <nav class="top-bar">
            <div class="top-bar-left">
                <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
                    <rect x="2" y="2" width="44" height="44" rx="12" stroke="url(#g2)" stroke-width="2.5"/>
                    <path d="M14 34V20l10-8 10 8v14" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="24" cy="26" r="4" stroke="url(#g2)" stroke-width="2"/>
                    <defs><linearGradient id="g2" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
                </svg>
                <span id="topClientName" class="top-client">—</span>
            </div>
            <div class="top-bar-right">
                <button class="btn-icon" onclick="saveProgress()" title="Fortschritt speichern">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M5 3h8l4 4v8a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z" stroke="currentColor" stroke-width="1.5"/><path d="M7 3v4h5V3M7 17v-5h6v5" stroke="currentColor" stroke-width="1.5"/></svg>
                </button>
                <button class="btn-icon" onclick="generateReport()" title="Report generieren">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M6 2h5l5 5v9a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2z" stroke="currentColor" stroke-width="1.5"/><path d="M11 2v5h5M8 10h4M8 13h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
            </div>
        </nav>

        <!-- Module Navigation -->
        <div class="module-nav" id="moduleNav"></div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Question Card Area -->
        <main class="card-area" id="cardArea"></main>

        <!-- Bottom Nav -->
        <div class="bottom-nav">
            <button class="btn-secondary" id="btnPrev" onclick="prevQuestion()">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M16 10H4m0 0l4-4m-4 4l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Zurück
            </button>
            <span class="question-counter" id="questionCounter">1 / 18</span>
            <button class="btn-primary btn-sm" id="btnNext" onclick="nextQuestion()">
                Weiter
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M4 10h12m0 0l-4-4m4 4l-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
    </div>

    <!-- Report Screen -->
    <div id="report" class="screen">
        <nav class="top-bar">
            <div class="top-bar-left">
                <button class="btn-secondary btn-sm" onclick="backToAssessment()">← Zurück zum Assessment</button>
            </div>
            <div class="top-bar-right">
                <button class="btn-primary btn-sm" onclick="printReport()">
                    <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M5 8V2h10v6M5 14H3a1 1 0 01-1-1v-4a1 1 0 011-1h14a1 1 0 011 1v4a1 1 0 01-1 1h-2" stroke="currentColor" stroke-width="1.5"/><rect x="5" y="12" width="10" height="6" stroke="currentColor" stroke-width="1.5"/></svg>
                    Drucken / PDF
                </button>
            </div>
        </nav>
        <div class="report-content" id="reportContent"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
